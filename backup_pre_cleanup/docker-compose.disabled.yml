version: '3.8'
services:
  # Docker Compose has been disabled in this repository per project policy.
  # The original compose file has been preserved here as a reference.
  # To re-enable Docker, rename this file back to `docker-compose.yml`.

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ai_assistant
      MYSQL_USER: ai_user
      MYSQL_PASSWORD: StrongPassword123
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; code=urllib.request.urlopen('http://localhost:5000/health').getcode(); sys.exit(0) if code==200 else sys.exit(1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    environment:
      - DATABASE_URL=mysql+aiomysql://ai_user:StrongPassword123@mysql/ai_assistant
      - APP_TIMEZONE=Asia/Kolkata
      - GOOGLE_CLIENT_SECRETS_FILE=/secrets/credentials.json
      - GOOGLE_TOKEN_FILE=/secrets/token.json
      - API_HOST=0.0.0.0
      - API_PORT=5000
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/token.json:/secrets/token.json:ro
      - ./backend/credentials.json:/secrets/credentials.json:ro
    ports:
      - 5001:5000
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - 80:80
    networks:
      - internal

volumes:
  db_data:

networks:
  internal:
    driver: bridge
